name: "Deploy Everything to GCP"

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: "plated-client-499118-m4" 
  GCP_REGION: "us-central1"             
  SERVICE_NAME: "movie-analytics-app"

jobs:
  deploy:
    name: "Application Build & Push Pipeline"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker --quiet

      # This builds the image of app.py using your Dockerfile
      - name: Build and Push Container Image
        run: |
          docker build -t gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # Corrected Step: Updates only the container image without wiping out Terraform environment variables
      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }}